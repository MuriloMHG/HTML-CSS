<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adapt de imgs</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Abra esse site em vários dispositivos diferentes, ou modifique o tamanho da sua janela do navegador </p>

    <picture>
        <source media="(max-width: 725px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1025px )" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Foto-flexível">
    </picture>

    <h1>Reproduzir Áudio</h1>
    <p>Vamos reproduzir áudios em HTML5 agora!</p>
    <audio src="midia/purasacanagem.mp3" controls loop></audio>
    <p>Caso queira, clique <a href="midia/purasacanagem.mp3" target="_blank" rel="external ">Aqui</a> para baixar o seu áudio</p>
</body>
</html>
